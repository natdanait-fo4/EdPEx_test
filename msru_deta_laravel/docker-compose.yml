services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    image: laravel-app
    container_name: msru_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - msru_network

  web:
    image: nginx:alpine
    container_name: msru_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - msru_network

  db:
    image: mysql:8.0
    container_name: msru_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: msru_deta_best_db
      MYSQL_ROOT_PASSWORD: root
      MYSQL_ALLOW_EMPTY_PASSWORD: 1
    ports:
      - "33060:3306"
    volumes:
      - msru_db_data:/var/lib/mysql
    networks:
      - msru_network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: msru_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: root
      UPLOAD_LIMIT: 500M
    ports:
      - "8080:80"
    depends_on:
      - db
    networks:
      - msru_network

networks:
  msru_network:
    driver: bridge

volumes:
  msru_db_data:
